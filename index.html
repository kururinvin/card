<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body{
            background: linear-gradient(-100deg, #756199, #ffffff, #5113c4);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            color: #E6EFF7;
        }
        @keyframes gradientBG{
            0%{background-position: 0% 50%;}
            50%{background-position: 100% 50%;}
            100%{background-position: 0% 50%;}
        }
        .card{
            background-color: #3A2D34;
            padding: 20px;
            border-radius: 12px;
            width: 500px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0.1);
        }
        .imgperfil{
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 5px solid #756199
        }
        h2{
            margin: 10px 0 5px;
            font-size: 30px;
        }
        .local{
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .job{
            line-height: 1.5;
        }
        .botoes{
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .btn{
            background-color: aliceblue;
            text-decoration: none;
            color: black;
            text-align: center;
            display: inline-block;
            padding: 10px 18px;
            border-radius: 6px;
            border: 1px solid rgb(113, 189. 240);
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn:hover{
            opacity: 0.8;
            background: #756199;
        }
        .skills{
            margin-top: 20px;
            text-align: left;
        }
        .tags{
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag{
            border: 1px solid #756199;
            padding: 5px 10px;
        }
        .social-media{
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 20px;
        }
        .social-media i{
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }
        .social-media a{
            text-decoration: none;
            color: #756199
        }
        .social-media i:hover{
            color: #756199;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="euu.png" alt="Foto de Perfil" class="imgperfil">
        <h2>Victor Hugo Moreira Fernandes</h2>
        <div class="local">Montes Claros - MG</div>
        <div class="job">Técnico em Informática - SENAC<br>Designer Gráfico - SENAI</div>
         
        <div class="botoes">
            <a href="https://wa.me/5538999061707?text=Olá,%20vim%20pelo%20card." class="btn primario">Mensagem</a>
            <a href="#" class="btn secundario">Follow</a>
        </div>
         <div class="skills">
            <h3>Habilidades</h3>
            <div class="tags">
                <span class="tag">Manutenção de computadores</span><br>
                <span class="tag">Trabalho em equipe</span><br>
                <span class="tag">Conhecimento em Redes</span><br>
                <span class="tag">Python</span><br>
                <span class="tag">HTML & CSS</span><br>
                <span class="tag">Resolução de problemas</span><Br>
                <span class="tag">Criação de Layouts</span><br>
            </div>
        </div>
        <div class="social-media">
            <a href="https://github.com/kururinvin"><i class="fab fa-github"></i></a>
            <a href="https://instagram.com/httpvito"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
    
</body>
</html>
